server:
  forward-headers-strategy: native

spring:
  application:
    name: matchmyduo
  profiles:
    active: dev
    include: secret

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      auto-commit: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
    defer-datasource-initialization: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  default-produces-media-type: application/json

logging:
  level:
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.orm.jdbc.extract: WARN
    org.springframework.transaction.interceptor: INFO
    com.back.matchduo: INFO

custom:
  jwt:
    secretPattern: ${JWT_SECRET}
    accessExpireSeconds: 3600
    refreshExpireSeconds: 604800
  cookie:
    path: /

riot:
  api:
    base-url: ${RIOT_API_BASE_URL:https://asia.api.riotgames.com}
    key: ${RIOT_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: matchmyduo
