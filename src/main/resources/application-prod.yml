spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://mysql_1:3306/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: redis_1
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

logging:
  level:
    com.back: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.orm.jdbc.extract: WARN
    org.springframework.transaction.interceptor: WARN

custom:
  base-url: ${CUSTOM_PROD_BACK_URL}
  site:
    domain: ${CUSTOM_PROD_DOMAIN}
    backUrl: ${CUSTOM_PROD_BACK_URL}
    frontUrl: ${CUSTOM_PROD_FRONT_URL}
  cookie:
    secure: true
    sameSite: "None"

cloud:
  aws:
    s3:
      bucket: matchduo-profile
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false
