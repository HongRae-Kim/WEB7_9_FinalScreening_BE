name: deploy
env:
  IMAGE_NAME: matchmyduo

on:
  push:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "build.gradle.kts"
      - "Dockerfile"
    branches:
      - main

# 권한 최소화/명시화
permissions:
  contents: write # 태그/릴리즈
  packages: write # GHCR 푸시

jobs:
  makeTagAndRelease:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Tag
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.MY_GHCR_TOKEN }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GHCR_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          release_name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: ${{ steps.create_tag.outputs.changelog }}
          draft: false
          prerelease: false

  buildImageAndPush:
    name: 도커 이미지 빌드와 푸시
    needs: makeTagAndRelease
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.export_owner.outputs.owner_lc }}
      image_name: ${{ steps.export_image.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v2
      - name: 레지스트리 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.MY_GHCR_TOKEN }}

      - name: set lower case owner name
        id: export_owner
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: export image name
        id: export_image
        run: echo "image_name=matchmyduo" >> $GITHUB_OUTPUT

      - name: 빌드 앤 푸시
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:cache,mode=max
          tags: |
            ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:${{ needs.makeTagAndRelease.outputs.tag_name }},
            ghcr.io/${{ steps.export_owner.outputs.owner_lc }}/${{ steps.export_image.outputs.image_name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [buildImageAndPush]
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: 인스턴스 ID 가져오기
        id: get_instance_id
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=matchmyduo-ec2-1" "Name=instance-state-name,Values=running" --query "Reservations[].Instances[].InstanceId" --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo $INSTANCE_ID
      - name: AWS SSM Send-Command
        uses: peterkimzz/aws-ssm-send-command@master
        id: ssm
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ env.INSTANCE_ID }}
          working-directory: /home/ubuntu
          comment: Deploy
          command: |
            # 변수 설정
            IMAGE="ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest"
            NETWORK="common"
            HEALTH_ENDPOINT="/actuator/health"
            TIMEOUT=120
            
            # 이미지 풀 및 비밀번호 생성 (이전과 동일)
            echo "${{ secrets.MY_GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            docker pull "$IMAGE" || { echo "❌ 이미지 풀 실패"; exit 1; }
            
            # 현재 실행 중인 컨테이너 확인
            if docker ps --format '{{.Names}}' | grep -q "app1_1"; then
              CURRENT="app1_1"
              CURRENT_PORT=8080
              NEXT="app1_2"
              NEXT_PORT=8081 # 헬스체크용 외부포트
            else
              CURRENT="app1_2"
              CURRENT_PORT=8081
              NEXT="app1_1"
              NEXT_PORT=8080 # 헬스체크용 외부포트
            fi
            
            # 신규 컨테이너 실행 (app1_1 또는 app1_2 이름 유지)
            docker stop "$NEXT" 2>/dev/null || true
            docker rm "$NEXT" 2>/dev/null || true
            
            docker run -d \
              --restart always \
              --network $NETWORK \
              --name "$NEXT" \
              -p "$NEXT_PORT":8080 \
              --env-file /home/ubuntu/matchmyduo/.env \
              -e SPRING_PROFILES_ACTIVE=prod \
              "$IMAGE" || { echo "❌ 컨테이너 실행 실패"; exit 1; }
            
            # 헬스 체크 (중요: HAProxy가 감지할 시간을 줘야 함)
            echo ">>> $NEXT 헬스체크 시작..."
            START_TIME=$(date +%s)
            while true; do
              UP=$(curl -s http://localhost:$NEXT_PORT$HEALTH_ENDPOINT | grep 'UP' || true)
              if [ -n "$UP" ]; then
                echo "✅ $NEXT 가 준비되었습니다. HAProxy가 곧 트래픽을 전환합니다."
                sleep 5 # HAProxy가 헬스체크로 UP을 확인할 수 있도록 잠시 대기
                break
              fi
            
              if [ $(( $(date +%s) - START_TIME )) -ge $TIMEOUT ]; then
                echo "❌ 헬스체크 타임아웃! 컨테이너 로그를 출력합니다:"
                docker logs "$NEXT"  # 실패 원인을 알기 위해 로그 출력 추가
                docker stop "$NEXT" && docker rm "$NEXT"
                exit 1
              fi
              sleep 5
            done
            
            # 설정 파일 내의 포트 번호를 동적으로 변경하고 리로드합니다.
            if command -v haproxy &> /dev/null; then
              if [ "$NEXT_PORT" == "8080" ]; then
                # app1_1(8080)을 살릴 때: 1_1은 8080으로, 1_2는 대기상태나 기존포트 유지 (여기서는 8080만 활성화)
                sudo sed -i "s/server app_server_1_1 .*/server app_server_1_1 127.0.0.1:8080 check/g" /etc/haproxy/haproxy.cfg
              elif [ "$NEXT_PORT" == "8081" ]; then
              # app1_2(8081)를 살릴 때
              sudo sed -i "s/server app_server_1_2 .*/server app_server_1_2 127.0.0.1:8081 check/g" /etc/haproxy/haproxy.cfg
              fi
              
              sudo systemctl reload haproxy
              echo "✅ HAProxy 설정 복구 및 트래픽 전환 완료: $NEXT_PORT"
            fi
            
            # HAProxy가 NEXT를 잡은 후 CURRENT를 꺼야 끊김이 없습니다.
            docker stop "$CURRENT" 2>/dev/null || true
            docker rm "$CURRENT" 2>/dev/null || true
            docker image prune -f
            echo "🚀 무중단 배포 완료: $NEXT 가 가동 중입니다."
