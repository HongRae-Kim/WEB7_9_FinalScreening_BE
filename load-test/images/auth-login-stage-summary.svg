<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="70" y="44" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">auth_login 단계별 비용 요약</text>
<text x="70" y="70" font-size="15" font-family="Arial, sans-serif" fill="#475569">테스트 로그 기준. Redis 전환 후 남은 주요 비용은 validatePassword(BCrypt) 구간</text>
<rect x="70" y="100" width="360" height="220" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
<text x="95" y="135" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">변경 전/후 핵심 비교</text>
<text x="95" y="175" font-size="16" font-family="Arial, sans-serif" fill="#334155">findByEmail: 1~5ms</text>
<text x="95" y="210" font-size="16" font-family="Arial, sans-serif" fill="#334155">validatePassword: 66~98ms</text>
<text x="95" y="245" font-size="16" font-family="Arial, sans-serif" fill="#334155">createTokens: 약 1ms</text>
<text x="95" y="280" font-size="16" font-family="Arial, sans-serif" fill="#16a34a">upsertRefreshToken: 2~5ms → 0.003~0.016ms</text>
<rect x="470" y="100" width="380" height="220" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
<text x="495" y="135" font-size="20" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">해석</text>
<text x="495" y="180" font-size="16" font-family="Arial, sans-serif" fill="#334155">- Redis 전환으로 DB upsert 병목은 제거됨</text>
<text x="495" y="215" font-size="16" font-family="Arial, sans-serif" fill="#334155">- auth API p95는 100ms대 유지</text>
<text x="495" y="250" font-size="16" font-family="Arial, sans-serif" fill="#334155">- 남은 주비용은 BCrypt matches()</text>
<text x="495" y="285" font-size="16" font-family="Arial, sans-serif" fill="#334155">- 추가 최적화는 보안 트레이드오프 검토 필요</text>
</svg>